name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (lint · types · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint (eslint)
        run: pnpm lint
      - name: Format check (prettier)
        run: pnpm format:check
      - name: Typecheck (tsc)
        run: pnpm typecheck
      - name: Test + coverage (vitest, incl. property fuzzing)
        run: pnpm test:coverage
      - name: Build (next build)
        run: pnpm build
        env:
          AUTH_SECRET: ci-build-only-placeholder-secret-value-1234567890
          AUTH_GITHUB_ID: ci-placeholder
          AUTH_GITHUB_SECRET: ci-placeholder

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Run e2e journeys (mocked API)
        run: pnpm e2e
        env:
          AUTH_SECRET: ci-e2e-placeholder-secret-value-1234567890
          AUTH_GITHUB_ID: ci-placeholder
          AUTH_GITHUB_SECRET: ci-placeholder

  python:
    name: python (ruff · pytest · hypothesis fuzz)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Renderer tests
        run: python -m pytest api/test_inkblot.py -q
      - name: Property fuzzing (hypothesis)
        run: python -m pytest api/test_fuzz_inkblot.py -q

  security:
    name: security (secrets · deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit
        run: pnpm audit --audit-level high
